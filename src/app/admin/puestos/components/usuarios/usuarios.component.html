<p-card *ngIf="puestos.length > 0; else noPuestos" styleClass="custom-card">
    <ng-template pTemplate="header">
        <div class="card-header flex align-items-center justify-content-between" style="padding: 1rem;">
            <span class="card-title">Usuarios</span>

            <div class="mx-3" style="flex: 1; max-width: 300px;">
                <input pInputText type="text" placeholder="Buscar" (input)="onFilter($event)"
                    class="p-inputtext-sm w-full" />
            </div>

            <p-button label="Crear" severity="success" (onClick)="crear()"></p-button>
        </div>
    </ng-template>

    <p-table #dt2 dataKey="id" [value]="usuarios" [paginator]="true" [rows]="5" [rowsPerPageOptions]="[5, 10, 20]"
        [globalFilterFields]="['name']" [tableStyle]="{ 'min-width': '50rem' }">



        <ng-template pTemplate="header">
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Correo</th>
                <th>Puesto</th>
                <th>Acciones</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-usuario>
            <tr>
                <td>{{ usuario.id }}</td>
                <td>{{ usuario.name }}</td>
                <td>{{ usuario.email }}</td>
                <td>{{ usuario.puesto.nombre }}</td>
                <td>
                    <div class="flex gap-2">
                        <p-button label="Editar" icon="pi pi-pencil" severity="warning" size="small"
                            class="custom-button" (onClick)="editar(usuario)" />

                        <p-button label="Eliminar" icon="pi pi-exclamation-triangle" severity="danger" size="small"
                            class="custom-button" (onClick)="eliminar(usuario)" />
                    </div>
                </td>
            </tr>
        </ng-template>
    </p-table>

</p-card>

<ng-template #noPuestos>
    <p-card styleClass="custom-card text-center">
        <ng-template pTemplate="content">
            <div class="py-10">
                <i class="pi pi-exclamation-triangle text-yellow-500 text-4xl mb-3"></i>
                <h2 class="text-xl font-semibold mb-2">No hay puestos disponibles</h2>
                <p class="text-gray-600 mb-4">Debes crear al menos un puesto antes de poder registrar usuarios.</p>
            </div>
        </ng-template>
    </p-card>
</ng-template>

<app-crear-empleado *ngIf="displayCrear"></app-crear-empleado>

<p-toast position="bottom-left" key="usuarios"></p-toast>
