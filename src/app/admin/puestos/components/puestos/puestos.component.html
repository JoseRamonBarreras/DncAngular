<p-card styleClass="custom-card">
    <ng-template pTemplate="header">
        <div class="card-header flex align-items-center justify-content-between" style="padding: 1rem;">
            <span class="card-title">Puestos</span>

            <div class="mx-3" style="flex: 1; max-width: 300px;">
                <input pInputText type="text" placeholder="Buscar" (input)="onFilter($event)"
                    class="p-inputtext-sm w-full" />
            </div>

            <p-button label="Crear" severity="success" (onClick)="crear()"></p-button>
        </div>
    </ng-template>

    <p-table #dt2 dataKey="id" [value]="puestos" [paginator]="true" [rows]="5" [rowsPerPageOptions]="[5, 10, 20]"
        [globalFilterFields]="['nombre']" [tableStyle]="{ 'min-width': '50rem' }">



        <ng-template pTemplate="header">
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Descripcion</th>
                <th>Acciones</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-puesto>
            <tr>
                <td>{{ puesto.id }}</td>
                <td>{{ puesto.nombre }}</td>
                <td>{{ puesto.descripcion }}</td>
                <td>
                    <div class="flex gap-2">
                        <p-button label="Editar" icon="pi pi-pencil" severity="warning" size="small"
                            class="custom-button" (onClick)="editar(puesto)" />

                        <p-button label="Eliminar" icon="pi pi-exclamation-triangle" severity="danger" size="small"
                            class="custom-button" (onClick)="eliminar(puesto)" />
                    </div>
                </td>
            </tr>
        </ng-template>
    </p-table>

</p-card>

<app-crear-puesto *ngIf="displayCrear"></app-crear-puesto>

<p-toast position="bottom-left" key="puestos"></p-toast>
