<p-card styleClass="custom-card">
    <ng-template pTemplate="header">
        <div class="card-header flex align-items-center justify-content-between" style="padding: 1rem;">
            <span class="card-title">Encuestas</span>

            <div class="mx-3" style="flex: 1; max-width: 300px;">
                <input pInputText type="text" placeholder="Buscar" (input)="onFilter($event)"
                    class="p-inputtext-sm w-full" />
            </div>

            <p-button label="Crear" severity="success" (onClick)="crear()"></p-button>
        </div>
    </ng-template>

    <p-table #dt2 dataKey="id" [value]="encuestas" [paginator]="true" [rows]="5" [rowsPerPageOptions]="[5, 10, 20]"
        [globalFilterFields]="['titulo']" [tableStyle]="{ 'min-width': '50rem' }">



        <ng-template pTemplate="header">
            <tr>
                <th>ID</th>
                <th>Titulo</th>
                <th>Descripcion</th>
                <th>Fecha</th>
                <th>Puesto</th>
                <th>Acciones</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-encuesta>
            <tr>
                <td>{{ encuesta.id }}</td>
                <td>{{ encuesta.titulo }}</td>
                <td>{{ encuesta.descripcion }}</td>
                <td>{{ encuesta.fecha_creacion }}</td>
                <td>{{ encuesta.puesto.nombre }}</td>
                <td>
                    <div class="flex gap-2">
                      <p-button label="Ver" icon="pi pi-eye" severity="help" size="small"
                            class="custom-button" (onClick)="ver(encuesta)" />

                        <p-button label="Editar" icon="pi pi-pencil" severity="warning" size="small"
                            class="custom-button" (onClick)="editar(encuesta)" />

                        <p-button label="Eliminar" icon="pi pi-exclamation-triangle" severity="danger" size="small"
                            class="custom-button" (onClick)="eliminar(encuesta)" />
                    </div>
                </td>
            </tr>
        </ng-template>
    </p-table>

</p-card>

<app-crear-encuesta *ngIf="displayCrear"></app-crear-encuesta>

<p-toast position="top-left" key="encuestas"></p-toast>
