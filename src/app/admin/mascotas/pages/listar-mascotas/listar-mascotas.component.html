<div class="grid">
    <div class="col-4">
        <p-card styleClass="custom-card">
            <ng-template pTemplate="header">
                <div class="card-header">
                    <span class="card-title">Contacto</span>
                </div>
            </ng-template>
            <app-contact-info></app-contact-info>
        </p-card>
    </div>

    <div class="col-8">
        <p-card styleClass="custom-card">
            <ng-template pTemplate="header">
                <div class="card-header">
                    <span class="card-title">Mascotas</span>
                    <p-button label="Crear" severity="success" (onClick)="crear()" />
                </div>
            </ng-template>

            <p-table #dt2 dataKey="id" [value]="mascotas" [paginator]="true" [rows]="5"
                [rowsPerPageOptions]="[5, 10, 20]" [globalFilterFields]="['name']"
                [tableStyle]="{ 'min-width': '50rem' }">

                <ng-template pTemplate="caption" [ngStyle]="{ 'background-color': '#eee6d1' }">
                    <div class="flex align-items-center justify-content-between">

                        <p-iconField iconPosition="left" class="ml-auto">
                            <p-inputIcon>
                                <i class="pi pi-search"></i>
                            </p-inputIcon>
                            <input pInputText type="text" (input)="onFilter($event)" />
                        </p-iconField>
                    </div>
                </ng-template>

                <ng-template pTemplate="header">
                    <tr>
                        <th>ID</th>
                        <th>Foto</th>
                        <th>Nombre</th>
                        <th>Birthday</th>
                        <th>Especie</th>
                        <th>Acciones</th>
                    </tr>
                </ng-template>
                <ng-template pTemplate="body" let-mascota>
                    <tr>
                        <td>{{ mascota.id }}</td>
                        <td>
                            <img [src]="mascota.foto ? baseUrl + mascota.foto : fotoDemo" alt="Foto Mascota" width="40"
                                height="40" style="object-fit: cover; border-radius: 50%;" />
                        </td>
                        <td>{{ mascota.name }}</td>
                        <td>{{ mascota.birthday }}</td>
                        <td>{{ mascota.especie.especie }}</td>
                        <td>
                            <p-button label="Editar" icon="pi pi-user-edit" severity="warning" size="small"
                                class="custom-button" (onClick)="editar(mascota)" />

                            <p-button label="Eliminar" icon="pi pi-user-minus" severity="danger" size="small"
                                class="custom-button" (onClick)="eliminar(mascota)" />
                        </td>
                    </tr>
                </ng-template>
            </p-table>

        </p-card>

    </div>
</div>

<app-crear-mascota *ngIf="displayCrear"></app-crear-mascota>
