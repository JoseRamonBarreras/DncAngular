<p-dialog header="Recortar Imagen" [modal]="true" [(visible)]="visible" [position]="position"
    [style]="{ width: '90rem' }" (onHide)="cancelar()">
    <div class="grid">
        <div class="col-6">
            <input type="file" (change)="fileChangeEvent($event)" />
            <image-cropper [imageChangedEvent]="imageChangedEvent" [maintainAspectRatio]="true" [aspectRatio]="4 / 2.5"
                format="png" (imageCropped)="imageCropped($event)" (imageLoaded)="imageLoaded($event)"
                (cropperReady)="cropperReady()" (loadImageFailed)="loadImageFailed()"></image-cropper>
        </div>
        <div class="col-6">
            <h4>Preview Image</h4>
            <div style="margin-top: 25px;" *ngIf="loading">
                <p-progressBar mode="indeterminate" [style]="{ height: '6px' }" />
            </div>
            <img [src]="croppedImage" style="width: 100%; max-width: 500px;" />
        </div>
    </div>
    <div class="grid">
        <div class="col">
            <div class="text-right mt-4">
                <button type="button" pButton label="Cancelar" (click)="cancelar()" class="p-button-secondary"
                    style="margin-right: 5px;"></button>
                <button type="button" pButton label="Guardar" (click)="guardar()"
                    class="p-button-success mr-2"></button>

            </div>
        </div>
    </div>
</p-dialog>
