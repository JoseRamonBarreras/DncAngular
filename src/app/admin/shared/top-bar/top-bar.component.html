
<p-menubar [model]="menuItems">
    <ng-template pTemplate="start">
      <img [src]="logo" alt="Logo" class="logo" style="max-width: 130px;"/>
    </ng-template>
  
    <ng-template pTemplate="end">
      <p-splitButton label="Usuario" icon="pi pi-user" [model]="userMenu"></p-splitButton>
    </ng-template>
  </p-menubar>
